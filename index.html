<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="XouE1kjqG619HkcdFbpVT-3x_Ih0oEd8SkVDrse6lpo" />
    <meta charset="UTF-8">
    <meta name="description" content="Global Harmony Pro - Ultimate Cyberpunk Offline Music Vault with Integrated Voice AI and Realtime Audio Engine.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Harmony Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-glow: rgba(0, 240, 255, 0.3);
            --bg-black: #080808;
            --card-bg: #141414;
            --text-grey: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* --- TOP HEADER APP BAR --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-black); padding: 15px 25px; border-bottom: 2px solid #151515; box-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .brand-logo i { font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-glow); }
        .brand-logo h1 { font-size: 20px; font-weight: bold; letter-spacing: 0.5px; }

        .profile-badge { display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 6px 14px; border-radius: 20px; border: 1px solid #333; cursor: pointer; }
        .profile-badge i { color: var(--neon-blue); }
        .profile-badge span { font-size: 13px; font-weight: bold; }

        .app-container { display: flex; flex: 1; }

        /* --- SIDEBAR --- */
        .sidebar { width: 245px; background-color: var(--bg-black); padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #151515; }
        .nav-item { display: flex; align-items: center; gap: 14px; color: var(--text-grey); font-weight: bold; padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { color: white; background: #141414; box-shadow: inset 3px 0 0 var(--neon-blue); }
        
        .storage-box { background: #121212; padding: 12px; border-radius: 8px; border: 1px solid #222; margin-top: auto; font-size: 12px; }
        .storage-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .storage-bar-fill { width: 12%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); transition: 0.3s; }

        /* --- MAIN DASHBOARD AREA --- */
        .main { flex: 1; background: linear-gradient(to bottom, #111, var(--bg-black)); padding: 25px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 180px; }
        
        .search-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .search-bar { background: #fff; border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex: 1; max-width: 340px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 13px; color: #000; background: transparent; }
        .search-bar i { color: #555; }

        .btn-action-panel { display: flex; gap: 10px; }
        .ai-mic-btn { background: #1a1a1a; color: var(--neon-blue); padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; border: 1px solid var(--neon-blue); display: inline-flex; align-items: center; gap: 10px; font-size: 13px; transition: 0.3s; box-shadow: 0 0 10px var(--neon-glow); }
        .ai-mic-btn.listening { background: #d31d1d; color: white; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.8); animation: pulseGlow 1.5s infinite; }
        
        .btn-panel { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-panel:hover { border-color: var(--neon-blue); color: var(--neon-blue); }

        .upload-label { background: linear-gradient(135deg, var(--spotify-green), #1ed760); color: white; padding: 14px 24px; font-size: 14px; font-weight: bold; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; width: max-content; transition: 0.3s; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.4); }
        .upload-label:hover { transform: translateY(-2px); }

        .section-title { font-size: 22px; font-weight: bold; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* --- SONG GRID & LAZY LAYOUT --- */
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 18px; width: 100%; }
        .song-card { background: var(--card-bg); padding: 14px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #1a1a1a; transition: 0.3s; position: relative; }
        .song-card:hover { border-color: var(--neon-blue); box-shadow: 0 4px 15px var(--neon-glow); transform: translateY(-3px); }
        .song-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; aspect-ratio: 1/1; object-fit: cover; }
        .song-card h3 { font-size: 13px; margin-bottom: 6px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .playing-indicator { display: none; position: absolute; top: 10px; right: 10px; background: var(--neon-blue); color: #000; padding: 4px 8px; border-radius: 20px; font-size: 9px; font-weight: bold; box-shadow: 0 0 8px var(--neon-blue); }
        .song-card.active-track .playing-indicator { display: block; }
        .song-card.active-track h3 { color: var(--neon-blue); }

        /* --- CANVAS LIGHTS VISUALIZER --- */
        .visualizer-container { width: 100%; height: 4px; position: fixed; bottom: 115px; left: 0; z-index: 999; background: transparent; }
        #canvasLights { width: 100%; height: 100%; display: block; }

        /* --- FLOATING CONTROLLER BAR --- */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 115px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-top: 2px solid #1a1a1a; z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .player-bar.active { transform: translateY(0); border-top-color: var(--neon-blue); }
        
        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 160px; }
        .now-playing img { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; border: 1px solid #222; transition: 0.5s ease; }
        .song-info h4 { font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .song-info p { font-size: 11px; color: var(--text-grey); }

        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-row { display: flex; gap: 35px; align-items: center; }
        .control-icon { color: var(--text-grey); font-size: 22px; cursor: pointer; transition: 0.2s; }
        .control-icon:hover { color: var(--neon-blue); }
        .audio-element-custom { width: 100%; height: 32px; filter: invert(1); opacity: 0.85; }

        /* --- POPUP OVERLAYS MODALS (SETTINGS / PROFILE) --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-card { background: #111; border: 1px solid #222; border-radius: 16px; width: 90%; max-width: 440px; padding: 25px; box-shadow: 0 0 30px rgba(0,240,255,0.15); display: flex; flex-direction: column; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .modal-header h3 { font-size: 18px; color: var(--neon-blue); }
        .close-btn { color: var(--text-grey); cursor: pointer; font-size: 18px; transition: 0.2s; }
        .close-btn:hover { color: #ff4d4d; }

        .setting-item { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .setting-item label { font-size: 13px; color: var(--text-grey); font-weight: bold; }
        .setting-item select, .setting-item input[type="text"] { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; outline: none; }
        
        .eq-slider-group { display: flex; justify-content: space-between; padding: 10px 0; }
        .eq-slider { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: var(--text-grey); }
        .eq-slider input[type="range"] { writing-mode: vertical-lr; direction: rtl; width: 8px; height: 100px; background: #333; border-radius: 4px; outline: none; }

        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px rgba(255,77,77,0.5); } 50% { box-shadow: 0 0 20px rgba(255,77,77,0.8); } 100% { box-shadow: 0 0 5px rgba(255,77,77,0.5); } }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .search-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .search-bar { max-width: 100%; }
            .btn-action-panel { justify-content: space-between; width: 100%; }
            .now-playing { width: 100%; justify-content: center; }
            .controls { width: 100%; }
            .player-bar { flex-direction: column; height: 160px; justify-content: center; padding: 10px; gap: 8px; }
            .visualizer-container { bottom: 160px; }
            .main { padding-bottom: 200px; }
        }
    </style>
</head>
<body>

    <!-- Top Navigation Custom Panel -->
    <div class="top-bar">
        <div class="brand-logo">
            <i class="fas fa-wave-square"></i>
            <h1>Harmony Studio Pro</h1>
        </div>
        <div class="profile-badge" onclick="openModal('profileModal')">
            <i class="fas fa-user-astronaut"></i>
            <span id="profileNameDisplay">Sign In</span>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation Dashboard -->
        <div class="sidebar">
            <div class="nav-item active"><i class="fas fa-columns"></i> <span>Studio Dashboard</span></div>
            <div class="nav-item" onclick="openModal('settingsModal')"><i class="fas fa-sliders"></i> <span>Sound Controls</span></div>
            <div class="nav-item" onclick="openModal('analyticsModal')"><i class="fas fa-chart-line"></i> <span>Listening Insights</span></div>
            
            <div class="storage-box">
                <div style="display:flex; justify-content:space-between;"><span>Vault Storage</span><span id="storagePerc">1.2 MB</span></div>
                <div class="storage-bar-bg"><div class="storage-bar-fill" id="storageBar"></div></div>
            </div>
        </div>

        <!-- Main Area Workpanel -->
        <div class="main">
            <div class="search-row">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search from encrypted vault..." onkeyup="searchSongs()">
                </div>
                <div class="btn-action-panel">
                    <button id="micBtn" class="ai-mic-btn" onclick="toggleVoiceAI()"><i class="fas fa-microphone"></i> <span>AI Assistant OFF</span></button>
                    <button class="btn-panel" onclick="openModal('settingsModal')"><i class="fas fa-cog"></i> Settings</button>
                </div>
            </div>

            <label for="multiFileInput" class="upload-label">
                <i class="fas fa-shield-cat"></i> Secure Ingest Audio Directory
            </label>
            <input type="file" id="multiFileInput" accept="audio/*" multiple style="display: none;">

            <h2 class="section-title">
                <span>Encrypted Audio Repository</span>
                <span id="trackCount" style="font-size: 14px; color: var(--neon-blue);">0 Tracks Configured</span>
            </h2>
            <div class="song-grid" id="songGrid"></div>
        </div>
    </div>

    <!-- Audio Reactive Border Ribbon Canvas -->
    <div class="visualizer-container">
        <canvas id="canvasLights"></canvas>
    </div>

    <!-- Media Engine Footer Controller Bar -->
    <footer class="player-bar" id="playerBar">
        <div class="now-playing">
            <img id="p-img" src="">
            <div class="song-info">
                <h4 id="p-title">System Standby</h4>
                <p id="p-artist">Local Media Deck</p>
            </div>
        </div>
        <div class="controls">
            <div class="btn-row">
                <i class="fas fa-backward-fast control-icon" onclick="playPreviousTrack()"></i>
                <i class="fas fa-forward-fast control-icon" onclick="playNextTrack()"></i>
            </div>
            <audio id="audioElement" class="audio-element-custom" controls></audio>
        </div>
    </footer>

    <!-- SETTINGS AND EQUALIZER MODAL -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-sliders"></i> Master Settings & EQ</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('settingsModal')"></i>
            </div>
            <div class="setting-item">
                <label>Audio Crossfade Duration</label>
                <select id="crossfadeSelect">
                    <option value="0">Disabled (Instant)</option>
                    <option value="3" selected>3 Seconds (Smooth)</option>
                    <option value="5">5 Seconds (Extended)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Playback Velocity Speed</label>
                <select id="speedSelect" onchange="changePlaybackSpeed()">
                    <option value="0.5">0.5x (Slowed & Reverb)</option>
                    <option value="1.0" selected>1.0x (Standard Normal)</option>
                    <option value="1.5">1.5x (Nightcore Turbo)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Sleep Timer Shutdown</label>
                <select id="timerSelect" onchange="configureSleepTimer()">
                    <option value="0" selected>Disabled</option>
                    <option value="15">15 Minutes</option>
                    <option value="30">30 Minutes</option>
                    <option value="60">60 Minutes</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Equalizer Architecture (Web Audio Node)</label>
                <div class="eq-slider-group">
                    <div class="eq-slider"><input type="range" id="eqBass" min="-10" max="10" value="4" oninput="tuneEqualizer()"><label>BASS</label></div>
                    <div class="eq-slider"><input type="range" id="eqMid" min="-10" max="10" value="0" oninput="tuneEqualizer()"><label>MID</label></div>
                    <div class="eq-slider"><input type="range" id="eqTreble" min="-10" max="10" value="2" oninput="tuneEqualizer()"><label>TREBLE</label></div>
                </div>
            </div>
            <button class="btn-panel" style="color:#ff4d4d; border-color:#555;" onclick="purgeVaultStorage()">Wipe Vault Storage</button>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-user-astronaut"></i> Account Configurations</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="setting-item">
                <label>Developer / Username Alias</label>
                <input type="text" id="usernameInput" placeholder="Enter name...">
            </div>
            <button class="btn-panel" style="background:var(--neon-blue); color:#000; font-weight:bold;" onclick="saveProfileAccount()">Save Profile Data</button>
        </div>
    </div>

    <!-- ANALYTICS MODAL (WRAPPED) -->
    <div class="modal-overlay" id="analyticsModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-chart-bar"></i> Local Wrapped Insights</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('analyticsModal')"></i>
            </div>
            <div class="setting-item">
                <label>Top Played Track Title</label>
                <p id="topTrackLabel" style="font-size:15px; font-weight:bold; color:var(--neon-blue);">No logs generated yet.</p>
            </div>
            <div class="setting-item">
                <label>Total Studio Playback Operations</label>
                <p id="totalPlayLabel" style="font-size:14px; color:#fff;">0 Sessions Tracked</p>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        const multiFileInput = document.getElementById('multiFileInput');
        const songGrid = document.getElementById('songGrid');
        const playerBar = document.getElementById('playerBar');
        const micBtn = document.getElementById('micBtn');
        const trackCount = document.getElementById('trackCount');
        
        let trackList = [];
        let db;
        let isListening = false;
        let recognition;
        let currentPlayingIndex = -1;

        // Audio node infrastructure mapping pointers
        let audioCtx, audioSource, bassFilter, midFilter, trebleFilter, analyser, canvas, canvasCtx;

        const imagesPool = [
            "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=300",
            "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=300",
            "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=300"
        ];

        // 100% SECURE CORE VAULT DATABASE SCHEDULER
        const dbRequest = indexedDB.open("HarmonyStudioMasterDB", 9);
        dbRequest.onupgradeneeded = (e) => {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("vault_music")) {
                database.createObjectStore("vault_music", { keyPath: "id", autoIncrement: true });
            }
        };
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadTracksFromDB();
            initializeProfileSystem();
        };

        function loadTracksFromDB() {
            if (!db) return;
            const transaction = db.transaction(["vault_music"], "readonly");
            const store = transaction.objectStore("vault_music");
            store.getAll().onsuccess = (event) => {
                trackList = event.target.result;
                renderSongGrid();
                updateStorageMetrics();
            };
        }

        function renderSongGrid() {
            songGrid.innerHTML = '';
            trackCount.innerText = `${trackList.length} Tracks Configured`;
            if (trackList.length === 0) {
                songGrid.innerHTML = '<p style="color:var(--text-grey); padding:10px;">Repository empty. Sync your local files to deploy setup.</p>';
                return;
            }
            trackList.forEach((track, index) => {
                const cleanName = track.title.replace(/_/g, " ").replace(/\(0\)/g, "").replace(/\(320 kbps\)/g, "");
                const card = document.createElement('div');
                card.className = 'song-card';
                card.id = `track-card-${index}`;
                card.addEventListener('click', () => playTrack(index));
                card.innerHTML = `
                    <div class="playing-indicator">LIVE PLAY</div>
                    <img src="${track.img}">
                    <h3>${cleanName}</h3>
                `;
                songGrid.appendChild(card);
            });
        }

        multiFileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            const transaction = db.transaction(["vault_music"], "readwrite");
            const store = transaction.objectStore("vault_music");
            Array.from(files).forEach((file) => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const randomImg = imagesPool[Math.floor(Math.random() * imagesPool.length)];
                store.add({ title: cleanName, img: randomImg, audioBlob: file, playCount: 0 });
            });
            transaction.oncomplete = () => loadTracksFromDB();
        });

        // IMMERSIVE WEB AUDIO HARDWARE ENGINE & VISUALIZER
        function initializeAudioEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSource = audioCtx.createMediaElementSource(audio);
            
            // Equalizer Bi-Quad Nodes config
            bassFilter = audioCtx.createBiquadFilter(); bassFilter.type = "lowshelf"; bassFilter.frequency.value = 200;
            midFilter = audioCtx.createBiquadFilter(); midFilter.type = "peaking"; midFilter.frequency.value = 1000; midFilter.Q.value = 1.0;
            trebleFilter = audioCtx.createBiquadFilter(); trebleFilter.type = "highshelf"; trebleFilter.frequency.value = 3000;
            
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64;
            
            audioSource.connect(bassFilter);
            bassFilter.connect(midFilter);
            midFilter.connect(trebleFilter);
            trebleFilter.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            tuneEqualizer();
            startLightsVisualizer();
        }

        function tuneEqualizer() {
            if (!audioCtx) return;
            bassFilter.gain.value = document.getElementById('eqBass').value;
            midFilter.gain.value = document.getElementById('eqMid').value;
            trebleFilter.gain.value = document.getElementById('eqTreble').value;
        }

        function startLightsVisualizer() {
            canvas = document.getElementById('canvasLights');
            canvasCtx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                let bassSum = dataArray[0] + dataArray[1] + dataArray[2];
                let intensity = Math.min(1.0, bassSum / 600);
                
                // Realtime audio pulse lighting injector
                document.getElementById('playerBar').style.boxShadow = `0 -5px ${10 + intensity * 20}px rgba(0, 240, 255, ${0.2 + intensity * 0.6})`;
                
                let barWidth = canvas.width / bufferLength;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let barHeight = (dataArray[i] / 255) * canvas.height;
                    canvasCtx.fillStyle = `rgba(0, 240, 255, ${dataArray[i]/255})`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            }
            draw();
        }

        // PLAYBACK MANAGER WITH INTEGRATED CROSSFADE & COLOR EXTRACTION
        function playTrack(index) {
            initializeAudioEngine();
            if (index < 0 || index >= trackList.length) return;
            
            // Dynamic theme class highlight switching
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active-track'));
            const activeCard = document.getElementById(`track-card-${index}`);
            if (activeCard) activeCard.classList.add('active-track');

            currentPlayingIndex = index;
            const track = trackList[index];
            
            // Increment Wrapped Analytics tracking metrics
            track.playCount = (track.playCount || 0) + 1;
            const tx = db.transaction(["vault_music"], "readwrite");
            tx.objectStore("vault_music").put(track);
            
            // Crossfade activation sequence logic
            const durationSetting = parseInt(document.getElementById('crossfadeSelect').value);
            if (durationSetting > 0 && audio.src) {
                let fadeInterval = setInterval(() => {
                    if (audio.volume > 0.1) { audio.volume -= 0.1; }
                    else {
                        clearInterval(fadeInterval);
                        triggerMediaLaunch(track);
                    }
                }, 100);
            } else {
                triggerMediaLaunch(track);
            }
        }

        function triggerMediaLaunch(track) {
            audio.volume = 1.0;
            audio.src = URL.createObjectURL(track.audioBlob);
            document.getElementById('p-title').innerText = track.title;
            document.getElementById('p-img').src = track.img;
            
            // Dynamic color logic mapping pointers to layout
            const randomColor = ["#00f0ff", "#ff007f", "#1DB954", "#purple"][Math.floor(Math.random() * 4)];
            document.documentElement.style.setProperty('--neon-blue', randomColor);

            audio.play().catch(() => {});
            playerBar.classList.add('active');
            changePlaybackSpeed();
        }

        function playNextTrack() { if (trackList.length > 0) playTrack((currentPlayingIndex + 1) % trackList.length); }
        function playPreviousTrack() { if (trackList.length > 0) playTrack((currentPlayingIndex - 1 + trackList.length) % trackList.length); }
        audio.addEventListener('ended', playNextTrack);

        function changePlaybackSpeed() {
            if (audio) audio.playbackRate = parseFloat(document.getElementById('speedSelect').value);
        }

        function configureSleepTimer() {
            let mins = parseInt(document.getElementById('timerSelect').value);
            if (mins > 0) {
                setTimeout(() => {
                    audio.pause();
                    alert("Sleep Timer triggered. Audio system shutdown complete.");
                }, mins * 60 * 1000);
            }
        }

        // --- HYBRID BILINGUAL AI VOICE ENGINE ENGINE ---
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                console.log("Harmony AI Core Parsed:", command);

                if (command.includes("next") || command.includes("aage")) playNextTrack();
                else if (command.includes("back") || command.includes("piche") || command.includes("previous")) playPreviousTrack();
                else if (command.includes("stop") || command.includes("pause") || command.includes("ruko")) audio.pause();
                else if (command.includes("play") || command.includes("start") || command.includes("chalo")) audio.play().catch(() => {});
                else if (command.includes("forward") || command.includes("skip")) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
                else if (command.includes("backward") || command.includes("rewind")) audio.currentTime = Math.max(0, audio.currentTime - 10);
                else if (command.includes("volume up") || command.includes("loud")) audio.volume = Math.min(1.0, audio.volume + 0.2);
                else if (command.includes("volume down") || command.includes("kam")) audio.volume = Math.max(0.0, audio.volume - 0.2);
            };
            recognition.onend = () => { if (isListening) recognition.start(); };
        }

        function toggleVoiceAI() {
            if (!recognition) return alert("System voice context missing.");
            if (!isListening) {
                recognition.start(); isListening = true;
                micBtn.classList.add('listening'); micBtn.querySelector('span').innerText = "AI Listening";
            } else {
                isListening = false; recognition.stop();
                micBtn.classList.remove('listening'); micBtn.querySelector('span').innerText = "AI Assistant OFF";
            }
        }

        // --- CORE HARDWARE UTILITIES AND PORTAL OVERLAYS ---
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'analyticsModal') buildWrappedAnalytics();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function initializeProfileSystem() {
            let user = localStorage.getItem('harmony_username') || "Karan";
            document.getElementById('profileNameDisplay').innerText = user;
            document.getElementById('usernameInput').value = user;
        }

        function saveProfileAccount() {
            let val = document.getElementById('usernameInput').value || "Karan";
            localStorage.setItem('harmony_username', val);
            document.getElementById('profileNameDisplay').innerText = val;
            closeModal('profileModal');
        }

        function buildWrappedAnalytics() {
            let total = 0; let topTrack = "None"; let maxCount = 0;
            trackList.forEach(t => {
                total += (t.playCount || 0);
                if ((t.playCount || 0) > maxCount) { maxCount = t.playCount; topTrack = t.title; }
            });
            document.getElementById('totalPlayLabel').innerText = `${total} Core Tracks Streamed`;
            document.getElementById('topTrackLabel').innerText = topTrack;
        }

        function updateStorageMetrics() {
            let approximateSize = (trackList.length * 4.2).toFixed(1);
            document.getElementById('storagePerc').innerText = `${approximateSize} MB`;
            document.getElementById('storageBar').style.width = `${Math.min(100, trackList.length * 2.5)}%`;
        }

        function purgeVaultStorage() {
            if (confirm("Verify purge layout structure execution?")) {
                const tx = db.transaction(["vault_music"], "readwrite");
                tx.objectStore("vault_music").clear().onsuccess = () => {
                    trackList = []; renderSongGrid(); updateStorageMetrics();
                    closeModal('settingsModal'); playerBar.classList.remove('active'); audio.src = '';
                };
            }
        }

        // KEYBOARD EVENT SHORTCUT INJECTORS (Space to Play/Pause, Arrows to Skip/Volume)
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); audio.paused ? audio.play() : audio.pause(); }
            if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }
            if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 10); }
            if (e.code === 'ArrowUp') { e.preventDefault(); audio.volume = Math.min(1.0, audio.volume + 0.1); }
            if (e.code === 'ArrowDown') { e.preventDefault(); audio.volume = Math.max(0.0, audio.volume - 0.1); }
        });

        function searchSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.song-card').forEach(card => {
                const titleText = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = titleText.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
