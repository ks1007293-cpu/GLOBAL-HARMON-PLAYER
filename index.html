    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-light: #282828;
            --spotify-grey: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #000; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 240px; background-color: #000; padding: 20px 10px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        
        .brand-logo { display: flex; align-items: center; gap: 12px; padding: 10px 15px; margin-bottom: 5px; }
        .brand-logo img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--spotify-green); }
        .brand-logo h1 { font-size: 18px; font-weight: bold; color: white; letter-spacing: 0.5px; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 5px; }
            .sidebar .nav-item span, .sidebar .library h3, .sidebar .support-btn span, .sidebar .brand-logo h1 { display: none; }
            .brand-logo { padding: 10px; justify-content: center; }
            .brand-logo img { width: 35px; height: 35px; }
        }

        .nav-item { display: flex; align-items: center; gap: 15px; color: var(--spotify-grey); font-weight: bold; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: white; background: #1a1a1a; }
        .library { background: #121212; border-radius: 8px; flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; background: linear-gradient(to bottom, #222, var(--spotify-black)); overflow-y: auto; padding: 20px 20px 120px 20px; border-radius: 8px; margin: 8px 8px 8px 0; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; gap: 10px; }
        
        .search-bar { background: white; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex: 1; max-width: 350px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; color: #000; background: transparent; }
        .search-bar i { color: #000; }

        .auth-buttons { display: flex; gap: 15px; align-items: center; flex-shrink: 0; }
        @media (max-width: 480px) { .auth-buttons .btn-signup, .auth-buttons .btn-login { display: none; } }

        .btn-signup { color: var(--spotify-grey); font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-login, .btn-premium { background: white; color: black; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; border: none; }
        .btn-premium { background: var(--spotify-green); color: white; }
        .btn-login:hover, .btn-premium:hover { transform: scale(1.05); }

        .upload-label { background: var(--spotify-green); color: white; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; user-select: none; }
        .upload-label:active { transform: scale(0.98); background: #1aa34a; }

        .section-title { font-size: 24px; margin-bottom: 15px; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; }

        .song-card { background: #181818; padding: 15px; border-radius: 10px; transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #282828; }
        .song-card:hover { background: #282828; }
        .song-card img { width: 100%; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); aspect-ratio: 1/1; object-fit: cover; }
        .song-card h3 { font-size: 14px; margin-bottom: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-card p { color: var(--spotify-green); font-size: 12px; font-weight: bold; }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: -100px; left: 0; width: 100%; height: 90px; background: #121212; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; transition: 0.4s ease-in-out; z-index: 1000; border-top: 1px solid #282828; }
        .player-bar.active { bottom: 0; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 40%; }
        .now-playing img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .song-info h4 { font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 120px; }
        .song-info p { font-size: 11px; color: var(--spotify-grey); }

        .controls { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .audio-element-custom { width: 100%; }
    </style>
</head>

        <div class="nav-item active"><i class="fas fa-house"></i> <span>Home</span></div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()"><i class="fas fa-magnifying-glass"></i> <span>Search</span></div>

            <div class="nav-item" style="padding: 0;"><i class="fas fa-layer-group"></i> <span>Library</span> <i class="fas fa-plus" style="margin-left:auto" onclick="createPlaylist()"></i></div>

    <div class="main">
        <header>
            <div class="search-bar">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search from saved songs..." onkeyup="searchSongs()">
            </div>
            <div class="auth-buttons">
                <div class="btn-signup">Sign up</div>
                <button class="btn-login">Log in</button>
                <button class="btn-premium">Premium</button>
            </div>
        </header>

        <label for="multiFileInput" class="upload-label">
            <i class="fas fa-cloud-upload-alt"></i> Ek Saath Saare Gaane Save Karein
        </label>
        <input type="file" id="multiFileInput" accept="audio/*" multiple style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">

        <h2 class="section-title">Your Tracks</h2>
        <div class="song-grid" id="songGrid"></div>
    </div>

    <footer class="player-bar" id="playerBar">
        <div class="now-playing">
            <img id="p-img" src="">
            <div class="song-info">
                <h4 id="p-title">Song Title</h4>
                <p id="p-artist">Offline Player</p>
            </div>
        </div>
        <div class="controls">
            <audio id="audioElement" class="audio-element-custom" controls></audio>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('audioElement');
        const multiFileInput = document.getElementById('multiFileInput');
        const songGrid = document.getElementById('songGrid');
        const playerBar = document.getElementById('playerBar');
        
        let trackList = [];
        let db;
        let currentBlobUrl = null;
        let currentPlayingIndex = -1; 

        const imagesPool = [
            "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=300",
            "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=300",
            "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=300"
        ];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'harmony-v4-cache';
                    const ASSETS = [
                        location.origin + location.pathname,
                        'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'
                    ];
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => k !== CACHE_NAME ? caches.delete(k) : null))).then(() => self.clients.claim()));
                    });
                    self.addEventListener('fetch', e => {
                        if (e.request.method !== 'GET') return;
                        e.respondWith(caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => caches.match(location.origin + location.pathname))));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log(err));
            });
        }

        const dbRequest = indexedDB.open("GlobalHarmonyFinalDB_v3", 1);
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadTracksFromDB();
        };

        function loadTracksFromDB() {
            const transaction = db.transaction(["offline_tracks"], "readonly");
            const store = transaction.objectStore("offline_tracks");
            const getAllRequest = store.getAll();
            getAllRequest.onsuccess = () => {
                trackList = getAllRequest.result;
                renderSongGrid();
            };
        }

        function renderSongGrid() {
            songGrid.innerHTML = '';
            if (trackList.length === 0) {
                songGrid.innerHTML = '<p style="color: var(--spotify-grey); padding: 10px;">No tracks saved yet. Click the green button to add music!</p>';
                return;
            }
            const fragment = document.createDocumentFragment();
            trackList.forEach((track, index) => {
                const cleanName = track.title.replace(/_/g, " ").replace(/\(0\)/g, "").replace(/\(320 kbps\)/g, "");
                const card = document.createElement('div');
                card.className = 'song-card';
                card.addEventListener('click', () => playTrack(index));
                card.innerHTML = `
                    <img src="${track.img}">
                    <h3>${cleanName}</h3>
                    <p><i class="fas fa-check-circle"></i> Offline Ready</p>
                `;
                fragment.appendChild(card);
            });
            songGrid.appendChild(fragment);
        }

        multiFileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            const transaction = db.transaction(["offline_tracks"], "readwrite");
            const store = transaction.objectStore("offline_tracks");
            Array.from(files).forEach((file) => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const randomImg = imagesPool[Math.floor(Math.random() * imagesPool.length)];
                const trackData = { title: cleanName, img: randomImg, audioBlob: file };
                store.add(trackData);
            });
            transaction.oncomplete = () => { loadTracksFromDB(); };
        });

        function playTrack(index) {
            const track = trackList[index];
            if (!track) return;
            
            currentPlayingIndex = index; // Exact array index pointer locked

            if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); }
            currentBlobUrl = URL.createObjectURL(track.audioBlob);
            audio.src = currentBlobUrl; 
            
            const cleanTitle = track.title.replace(/_/g, " ").replace(/\(0\)/g, "");
            document.getElementById('p-title').innerText = cleanTitle;
            document.getElementById('p-img').src = track.img;
            audio.play().catch(err => console.log("Playback deferred"));
            playerBar.classList.add('active');
        }

        // --- ACCURATE FIXED NEXT SONG TRIGGER ---
        audio.addEventListener('ended', () => {
            if (trackList.length > 0 && currentPlayingIndex !== -1) {
                // Array index incremented safely
                let nextIndex = (currentPlayingIndex + 1) % trackList.length;
                playTrack(nextIndex);
            }
        });

        function searchSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.song-card');
            cards.forEach(card => {
                const titleText = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = titleText.includes(query) ? "block" : "none";
            });
        }

        function createPlaylist() {
            let name = prompt("Nayi Playlist ka naam:");
            if(name) {
                let li = document.createElement('li');
                li.innerText = "🎵 " + name;
                document.getElementById('playlist-list').appendChild(li);
            }
        }
    </script>
