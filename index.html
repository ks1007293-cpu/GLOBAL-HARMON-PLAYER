<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="XouE1kjqG619HkcdFbpVT-3x_Ih0oEd8SkVDrse6lpo" />
    <meta charset="UTF-8">
    <meta name="description" content="Global Harmony Pro - Play your favorite music tracks offline with a premium Spotify-inspired UI, created by Karan.">
    <meta name="keywords" content="Global Harmony Pro, Global Harmony, Music Player, Offline Player, Karan Music Player">
    <meta name="author" content="Karan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Harmony Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-light: #282828;
            --spotify-grey: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #000; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 240px; background-color: #000; padding: 15px 10px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        
        .brand-logo { display: flex; align-items: center; gap: 12px; padding: 10px 15px; }
        .brand-logo i { font-size: 28px; color: var(--spotify-green); flex-shrink: 0; } /* Fixed Vector Icon instead of broken link */
        .brand-logo h1 { font-size: 18px; font-weight: bold; color: white; letter-spacing: 0.5px; white-space: nowrap; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 5px; }
            .sidebar .nav-item span, .sidebar .library h3, .sidebar .support-btn span, .sidebar .brand-logo h1 { display: none; }
            .brand-logo { padding: 10px 0; justify-content: center; }
        }

        .nav-item { display: flex; align-items: center; gap: 15px; color: var(--spotify-grey); font-weight: bold; padding: 12px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: white; background: #1a1a1a; }
        .library { background: #121212; border-radius: 8px; flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; background: linear-gradient(to bottom, #222, var(--spotify-black)); overflow-y: auto; padding: 15px 15px 140px 15px; border-radius: 8px; margin: 8px 8px 8px 0; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; gap: 10px; }
        
        .search-bar { background: white; border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; flex: 1; max-width: 280px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 13px; color: #000; background: transparent; }
        .search-bar i { color: #000; }

        .auth-buttons { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        @media (max-width: 480px) { 
            .search-bar { max-width: 140px; padding: 6px 10px; }
            .btn-premium { padding: 6px 12px !important; font-size: 12px !important; }
        }

        .btn-premium { background: var(--spotify-green); color: white; padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; border: none; }
        .btn-premium:hover { transform: scale(1.05); }

        .upload-label { background: var(--spotify-green); color: white; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; user-select: none; }
        .upload-label:active { transform: scale(0.98); background: #1aa34a; }

        .section-title { font-size: 22px; margin-bottom: 15px; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; width: 100%; }

        .song-card { background: #181818; padding: 12px; border-radius: 10px; transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #282828; }
        .song-card:hover { background: #282828; }
        .song-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); aspect-ratio: 1/1; object-fit: cover; }
        .song-card h3 { font-size: 13px; margin-bottom: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-card p { color: var(--spotify-green); font-size: 11px; font-weight: bold; }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: -130px; left: 0; width: 100%; height: 110px; background: #121212; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; transition: 0.4s ease-in-out; z-index: 1000; border-top: 1px solid #282828; flex-wrap: wrap; }
        .player-bar.active { bottom: 0; }
        .now-playing { display: flex; align-items: center; gap: 10px; width: 35%; min-width: 120px; }
        .now-playing img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .song-info h4 { font-size: 12px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 110px; }
        .song-info p { font-size: 10px; color: var(--spotify-grey); }

        .controls { width: 60%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-row { display: flex; gap: 25px; align-items: center; margin-bottom: 2px; }
        .control-icon { color: var(--spotify-grey); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .control-icon:hover { color: white; transform: scale(1.1); }

        .audio-element-custom { width: 100%; height: 32px; }
        
        @media (max-width: 600px) {
            .player-bar { height: 125px; padding: 8px; }
            .now-playing { width: 100%; justify-content: center; margin-bottom: 5px; }
            .controls { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo">
            <i class="fas fa-music"></i> <h1>Harmony Pro</h1>
        </div>
        <div class="nav-item active"><i class="fas fa-house"></i> <span>Home</span></div>
        <div class="nav-item" onclick="document.getElementById('searchInput').focus()"><i class="fas fa-magnifying-glass"></i> <span>Search</span></div>
        <div class="library">
            <div class="nav-item" style="padding: 0;"><i class="fas fa-layer-group"></i> <span>Library</span></div>
            <ul id="playlist-list" style="list-style: none; color: var(--spotify-grey); font-size: 14px; display: flex; flex-direction: column; gap: 10px;"></ul>
        </div>
    </div>

    <div class="main">
        <header>
            <div class="search-bar">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search from saved songs..." onkeyup="searchSongs()">
            </div>
            <div class="auth-buttons">
                <button class="btn-premium">Premium</button>
            </div>
        </header>

        <label for="multiFileInput" class="upload-label">
            <i class="fas fa-cloud-upload-alt"></i> Ek Saath Saare Gaane Save Karein
        </label>
        <input type="file" id="multiFileInput" accept="audio/*" multiple style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">

        <h2 class="section-title">Your Tracks</h2>
        <div class="song-grid" id="songGrid"></div>
    </div>

    <footer class="player-bar" id="playerBar">
        <div class="now-playing">
            <img id="p-img" src="">
            <div class="song-info">
                <h4 id="p-title">Song Title</h4>
                <p id="p-artist">Offline Player</p>
            </div>
        </div>
        <div class="controls">
            <div class="btn-row">
                <i class="fas fa-step-backward control-icon" onclick="playPreviousTrack()"></i>
                <i class="fas fa-step-forward control-icon" onclick="playNextTrack()"></i>
            </div>
            <audio id="audioElement" class="audio-element-custom" controls></audio>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('audioElement');
        const multiFileInput = document.getElementById('multiFileInput');
        const songGrid = document.getElementById('songGrid');
        const playerBar = document.getElementById('playerBar');
        
        let trackList = [];
        let db;
        let currentBlobUrl = null;
        let currentPlayingIndex = -1; 

        const imagesPool = [
            "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=300",
            "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=300",
            "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=300"
        ];

        const dbRequest = indexedDB.open("GlobalHarmonyFinalDB_v3", 1);
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadTracksFromDB();
        };

        function loadTracksFromDB() {
            const transaction = db.transaction(["offline_tracks"], "readonly");
            const store = transaction.objectStore("offline_tracks");
            const getAllRequest = store.getAll();
            getAllRequest.onsuccess = () => {
                trackList = getAllRequest.result;
                renderSongGrid();
            };
        }

        function renderSongGrid() {
            songGrid.innerHTML = '';
            if (trackList.length === 0) {
                songGrid.innerHTML = '<p style="color: var(--spotify-grey); padding: 10px;">No tracks saved yet.</p>';
                return;
            }
            const fragment = document.createDocumentFragment();
            trackList.forEach((track, index) => {
                const cleanName = track.title.replace(/_/g, " ").replace(/\(0\)/g, "").replace(/\(320 kbps\)/g, "");
                const card = document.createElement('div');
                card.className = 'song-card';
                card.addEventListener('click', () => playTrack(index));
                card.innerHTML = `
                    <img src="${track.img}">
                    <h3>${cleanName}</h3>
                    <p><i class="fas fa-check-circle"></i> Offline Ready</p>
                `;
                fragment.appendChild(card);
            });
            songGrid.appendChild(fragment);
        }

        multiFileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            const transaction = db.transaction(["offline_tracks"], "readwrite");
            const store = transaction.objectStore("offline_tracks");
            Array.from(files).forEach((file) => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const randomImg = imagesPool[Math.floor(Math.random() * imagesPool.length)];
                const trackData = { title: cleanName, img: randomImg, audioBlob: file };
                store.add(trackData);
            });
            transaction.oncomplete = () => { loadTracksFromDB(); };
        });

        function playTrack(index) {
            const track = trackList[index];
            if (!track) return;
            
            currentPlayingIndex = index;

            if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); }
            currentBlobUrl = URL.createObjectURL(track.audioBlob);
            audio.src = currentBlobUrl; 
            
            const cleanTitle = track.title.replace(/_/g, " ").replace(/\(0\)/g, "");
            document.getElementById('p-title').innerText = cleanTitle;
            document.getElementById('p-img').src = track.img;
            audio.play().catch(() => {});
            playerBar.classList.add('active');
        }

        function playNextTrack() {
            if (trackList.length > 0 && currentPlayingIndex !== -1) {
                let nextIndex = (currentPlayingIndex + 1) % trackList.length;
                playTrack(nextIndex);
            }
        }

        function playPreviousTrack() {
            if (trackList.length > 0 && currentPlayingIndex !== -1) {
                let prevIndex = (currentPlayingIndex - 1 + trackList.length) % trackList.length;
                playTrack(prevIndex);
            }
        }

        audio.addEventListener('ended', playNextTrack);

        function searchSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.song-card');
            cards.forEach(card => {
                const titleText = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = titleText.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
