<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Global Harmony - Final Pro</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .nav { padding: 20px; background: #000; display: flex; gap: 10px; }
        .main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; padding: 20px; overflow-y: auto; background: #181818; }
        #content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        audio { width: 80%; background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="link" placeholder="MP3 Link Paste Karein...">
        <button onclick="playLink()">Play Online Link</button>
        <button onclick="document.getElementById('file').click()">Upload Offline</button>
        <input type="file" id="file" style="display:none" accept="audio/*">
    </div>

    <div class="main">
        <div id="sidebar"><h3>Playlist</h3><ul id="list"></ul></div>
        <div id="content">
            <h2 id="title">Global Harmony</h2>
            <audio id="player" controls></audio>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        // Offline Load
        document.getElementById('file').onchange = (e) => {
            for(let f of e.target.files) {
                let li = document.createElement('li');
                li.innerText = f.name;
                li.onclick = () => { player.src = URL.createObjectURL(f); player.play(); };
                document.getElementById('list').appendChild(li);
            }
        };
        // Online Load (Sirf Direct MP3 Link)
        function playLink() {
            player.src = document.getElementById('link').value;
            player.play();
        }
    </script>
</body>
</html>
