
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Global Harmony Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; display: flex; justify-content: space-between; background: #121212; align-items: center; }
        .main-content { flex: 1; padding: 40px; display: grid; grid-template-columns: 250px 1fr; gap: 40px; }
        
        /* BADE CARDS */
        .song-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .song-card { background: #181818; padding: 25px; border-radius: 15px; cursor: pointer; text-align: center; border: 2px solid #333; }
        .song-card img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .song-card p { font-size: 22px; font-weight: bold; }
        
        #player-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: #282828; display: flex; align-items: center; padding: 0 20px; }
    </style>
</head>
<body>
    <header>
        <div><i class="fas fa-home"></i> Home</div>
        <div onclick="searchOnline()" style="cursor:pointer"><i class="fas fa-search"></i> Search Online</div>
        <div><button>Log in</button> <button>Premium</button></div>
    </header>

    <div class="main-content">
        <div class="playlist-side" style="background:#181818; padding:20px;">
            <h3>Library +</h3>
        </div>
        <div class="song-grid">
            <div class="song-card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=500">
                <p>SoundHelix 1</p>
            </div>
            <div class="song-card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">
                <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=500">
                <p>SoundHelix 2</p>
            </div>
            <div class="song-card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')">
                <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?w=500">
                <p>SoundHelix 3</p>
            </div>
        </div>
    </div>
    <div id="player-bar"><audio id="audio-element" controls style="width:100%"></audio></div>
    
    <script>
        function playSong(url) {
            let audio = document.getElementById('audio-element');
            audio.src = url;
            audio.play();
        }
        function searchOnline() { window.open('https://www.youtube.com', '_blank'); }
    </script>
</body>
</html>
