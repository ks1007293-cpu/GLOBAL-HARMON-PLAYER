<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="XouE1kjqG619HkcdFbpVT-3x_Ih0oEd8SkVDrse6lpo" />
    <meta charset="UTF-8">
    <meta name="description" content="Global Harmony Pro - Play your favorite music tracks offline with a premium Spotify-inspired UI, created by Karan.">
    <meta name="keywords" content="Global Harmony Pro, Global Harmony, Music Player, Offline Player, Karan Music Player">
    <meta name="author" content="Karan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Harmony Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-light: #282828;
            --spotify-grey: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #000; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 240px; background-color: #000; padding: 15px 10px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        
        .brand-logo { display: flex; align-items: center; gap: 12px; padding: 10px 15px; }
        .brand-logo i { font-size: 24px; color: var(--spotify-green); flex-shrink: 0; }
        .brand-logo h1 { font-size: 18px; font-weight: bold; color: white; letter-spacing: 0.5px; white-space: nowrap; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 5px; }
            .sidebar .nav-item span, .sidebar .library h3, .sidebar .brand-logo h1 { display: none; }
            .brand-logo { padding: 10px 0; justify-content: center; }
        }

        .nav-item { display: flex; align-items: center; gap: 15px; color: var(--spotify-grey); font-weight: bold; padding: 12px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: white; background: #1a1a1a; }
        .library { background: #121212; border-radius: 8px; flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; background: linear-gradient(to bottom, #222, var(--spotify-black)); overflow-y: auto; padding: 15px 15px 140px 15px; border-radius: 8px; margin: 8px 8px 8px 0; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; gap: 10px; }
        
        .search-bar { background: white; border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; flex: 1; max-width: 280px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 13px; color: #000; background: transparent; }
        .search-bar i { color: #000; }

        /* --- AI MIC INDICATOR --- */
        .ai-mic-btn { background: #282828; color: #fff; padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; border: 1px solid #404040; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.3s; }
        .ai-mic-btn.listening { background: #d31d1d; color: white; border-color: #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.6); }

        .btn-premium { background: var(--spotify-green); color: white; padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; border: none; }
        .btn-premium:hover { transform: scale(1.05); }

        .upload-label { background: var(--spotify-green); color: white; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; user-select: none; }
        .upload-label:active { transform: scale(0.98); background: #1aa34a; }

        .section-title { font-size: 22px; margin-bottom: 15px; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; width: 100%; }

        .song-card { background: #181818; padding: 12px; border-radius: 10px; transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #282828; }
        .song-card:hover { background: #282828; }
        .song-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); aspect-ratio: 1/1; object-fit: cover; }
        .song-card h3 { font-size: 13px; margin-bottom: 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-card p { color: var(--spotify-green); font-size: 11px; font-weight: bold; }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: -130px; left: 0; width: 100%; height: 110px; background: #121212; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; transition: 0.4s ease-in-out; z-index: 1000; border-top: 1px solid #282828; flex-wrap: wrap; }
        .player-bar.active { bottom: 0; }
        .now-playing { display: flex; align-items: center; gap: 10px; width: 35%; min-width: 120px; }
        .now-playing img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .song-info h4 { font-size: 12px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 110px; }
        .song-info p { font-size: 10px; color: var(--spotify-grey); }

        .controls { width: 60%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-row { display: flex; gap: 25px; align-items: center; margin-bottom: 2px; }
        .control-icon { color: var(--spotify-grey); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .control-icon:hover { color: white; transform: scale(1.1); }

        .audio-element-custom { width: 100%; height: 32px; }
        
        @media (max-width: 600px) {
            .player-bar { height: 125px; padding: 8px; }
            .now-playing { width: 100%; justify-content: center; margin-bottom: 5px; }
            .controls { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo">
            <i class="fas fa-music"></i>
            <h1>Harmony Pro</h1>
        </div>
        <div class="nav-item active"><i class="fas fa-house"></i> <span>
