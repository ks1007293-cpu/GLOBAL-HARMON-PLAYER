<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="XouE1kjqG619HkcdFbpVT-3x_Ih0oEd8SkVDrse6lpo" />
    <meta charset="UTF-8">
    <meta name="description" content="Global Harmony Pro - Ultimate Cyberpunk Offline Music Vault with 15 Pro Audio Engines, created by Karan.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Harmony Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-glow: #00f0ff;
            --secondary-glow: #ff007f;
            --bg-black: #080808;
            --card-bg: #141414;
            --text-grey: #b3b3b3;
        }

        /* THEME PRESETS */
        body.theme-red { --primary-glow: #ff0044; --secondary-glow: #ff6600; }
        body.theme-gold { --primary-glow: #ffd700; --secondary-glow: #ff8c00; }
        body.theme-emerald { --primary-glow: #00ff88; --secondary-glow: #00bfff; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; transition: 0.3s; }

        /* --- TOP HEADER --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-black); padding: 15px 25px; border-bottom: 2px solid #151515; box-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .brand-logo i { font-size: 24px; color: var(--primary-glow); text-shadow: 0 0 12px var(--primary-glow); }
        .brand-logo h1 { font-size: 20px; font-weight: bold; letter-spacing: 0.5px; }

        .profile-badge { display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 6px 14px; border-radius: 20px; border: 1px solid #333; cursor: pointer; }
        .profile-badge i { color: var(--primary-glow); }

        .app-container { display: flex; flex: 1; }

        /* --- SIDEBAR --- */
        .sidebar { width: 250px; background-color: var(--bg-black); padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #151515; }
        .nav-item { display: flex; align-items: center; gap: 14px; color: var(--text-grey); font-weight: bold; padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { color: white; background: #141414; box-shadow: inset 3px 0 0 var(--primary-glow); }

        /* --- MAIN DASHBOARD --- */
        .main { flex: 1; background: linear-gradient(to bottom, #111, var(--bg-black)); padding: 25px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 180px; }
        
        .search-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .search-bar { background: #fff; border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex: 1; max-width: 340px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 13px; color: #000; background: transparent; }

        .btn-action-panel { display: flex; gap: 10px; flex-wrap: wrap; }
        .ai-mic-btn { background: #1a1a1a; color: var(--primary-glow); padding: 10px 18px; border-radius: 30px; font-weight: bold; cursor: pointer; border: 1px solid var(--primary-glow); display: inline-flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.3s; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .ai-mic-btn.listening { background: #d31d1d; color: white; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.8); }
        
        .btn-panel { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-panel:hover { border-color: var(--primary-glow); color: var(--primary-glow); }

        .upload-label { background: linear-gradient(135deg, #1DB954, #1ed760); color: white; padding: 14px 24px; font-size: 14px; font-weight: bold; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; width: max-content; transition: 0.3s; }

        .section-title { font-size: 22px; font-weight: bold; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 18px; width: 100%; }
        .song-card { background: var(--card-bg); padding: 14px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #1a1a1a; transition: 0.3s; position: relative; }
        .song-card:hover { border-color: var(--primary-glow); box-shadow: 0 4px 15px rgba(0,240,255,0.2); transform: translateY(-3px); }
        .song-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; aspect-ratio: 1/1; object-fit: cover; }
        .song-card h3 { font-size: 13px; margin-bottom: 6px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .playing-indicator { display: none; position: absolute; top: 10px; right: 10px; background: var(--primary-glow); color: #000; padding: 4px 8px; border-radius: 20px; font-size: 9px; font-weight: bold; }
        .song-card.active-track .playing-indicator { display: block; }
        .song-card.active-track h3 { color: var(--primary-glow); }

        /* --- HIGH DYNAMIC LIGHTS VISUALIZER RIBBON --- */
        .visualizer-container { width: 100%; height: 8px; position: fixed; bottom: 115px; left: 0; z-index: 999; background: rgba(0,0,0,0.5); }
        #canvasLights { width: 100%; height: 100%; display: block; }

        /* --- PLAYER CONTROLLER BAR --- */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 115px; background: rgba(10, 10, 10, 0.96); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-top: 2px solid #1a1a1a; z-index: 1000; transform: translateY(100%); transition: transform 0.4s ease; }
        .player-bar.active { transform: translateY(0); border-top-color: var(--primary-glow); }
        
        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 160px; }
        .now-playing img { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; border: 1px solid #222; }
        .song-info h4 { font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .song-info p { font-size: 11px; color: var(--text-grey); }

        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-row { display: flex; gap: 25px; align-items: center; }
        .control-icon { color: var(--text-grey); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .control-icon:hover, .control-icon.active { color: var(--primary-glow); }
        .audio-element-custom { width: 100%; height: 32px; filter: invert(1); opacity: 0.85; }

        /* --- MODAL POPUPS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-card { background: #111; border: 1px solid #222; border-radius: 16px; width: 90%; max-width: 460px; padding: 25px; display: flex; flex-direction: column; gap: 18px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .modal-header h3 { font-size: 18px; color: var(--primary-glow); }
        .close-btn { color: var(--text-grey); cursor: pointer; font-size: 18px; }

        .setting-item { display: flex; flex-direction: column; gap: 6px; }
        .setting-item label { font-size: 12px; color: var(--text-grey); font-weight: bold; }
        .setting-item select, .setting-item input[type="text"] { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; outline: none; }
        
        .eq-slider-group { display: flex; justify-content: space-between; padding: 10px 0; }
        .eq-slider { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: var(--text-grey); }
        .eq-slider input[type="range"] { writing-mode: vertical-lr; direction: rtl; width: 8px; height: 90px; background: #333; border-radius: 4px; outline: none; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .search-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .search-bar { max-width: 100%; }
            .now-playing { width: 100%; justify-content: center; }
            .controls { width: 100%; }
            .player-bar { flex-direction: column; height: 160px; justify-content: center; padding: 10px; gap: 8px; }
            .visualizer-container { bottom: 160px; }
            .main { padding-bottom: 200px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-logo">
            <i class="fas fa-compact-disc"></i>
            <h1>Harmony Pro Engine</h1>
        </div>
        <div class="profile-badge" onclick="openModal('profileModal')">
            <i class="fas fa-user-astronaut"></i>
            <span id="profileNameDisplay">Sign In</span>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="nav-item active"><i class="fas fa-home"></i> <span>Studio Home</span></div>
            <div class="nav-item" onclick="openModal('queueModal')"><i class="fas fa-list-ol"></i> <span>Up Next Queue</span></div>
            <div class="nav-item" onclick="openModal('settingsModal')"><i class="fas fa-sliders"></i> <span>FX & Equalizer</span></div>
            <div class="nav-item" onclick="openModal('analyticsModal')"><i class="fas fa-chart-pie"></i> <span>Wrapped Stats</span></div>
        </div>

        <div class="main">
            <div class="search-row">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search from 140+ vault tracks..." onkeyup="searchSongs()">
                </div>
                <div class="btn-action-panel">
                    <button id="micBtn" class="ai-mic-btn" onclick="toggleVoiceAI()"><i class="fas fa-microphone"></i> <span>AI Mode OFF</span></button>
                    <button class="btn-panel" onclick="openModal('settingsModal')"><i class="fas fa-cog"></i> Settings</button>
                </div>
            </div>

            <label for="multiFileInput" class="upload-label">
                <i class="fas fa-folder-plus"></i> Import Local Audio Directory
            </label>
            <input type="file" id="multiFileInput" accept="audio/*" multiple style="display: none;">

            <h2 class="section-title">
                <span>Core Audio Vault</span>
                <span id="trackCount" style="font-size: 14px; color: var(--primary-glow);">0 Tracks Configured</span>
            </h2>
            <div class="song-grid" id="songGrid"></div>
        </div>
    </div>

    <!-- HIGH DYNAMIC LIGHTS VISUALIZER -->
    <div class="visualizer-container">
        <canvas id="canvasLights"></canvas>
    </div>

    <!-- PLAYER FOOTER CONTROLLER -->
    <footer class="player-bar" id="playerBar">
        <div class="now-playing">
            <img id="p-img" src="">
            <div class="song-info">
                <h4 id="p-title">Ready System</h4>
                <p id="p-artist">Local Media Deck</p>
            </div>
        </div>
        <div class="controls">
            <div class="btn-row">
                <i class="fas fa-backward-step control-icon" onclick="playPreviousTrack()"></i>
                <i id="bassBoostBtn" class="fas fa-bolt control-icon" title="Toggle Bass Boost" onclick="toggleBassBoost()"></i>
                <i id="spatialBtn" class="fas fa-headphone-accessibility control-icon" title="Toggle 8D Audio" onclick="toggleSpatialAudio()"></i>
                <i class="fas fa-forward-step control-icon" onclick="playNextTrack()"></i>
            </div>
            <audio id="audioElement" class="audio-element-custom" controls></audio>
        </div>
    </footer>

    <!-- SETTINGS & FX MODAL -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-sliders"></i> FX & Sound Control</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('settingsModal')"></i>
            </div>
            <div class="setting-item">
                <label>Theme Style Engine</label>
                <select onchange="changeTheme(this.value)">
                    <option value="cyan">Cyberpunk Cyan (Default)</option>
                    <option value="red">Neon Blood Red</option>
                    <option value="gold">Gold VIP Glow</option>
                    <option value="emerald">Emerald Green</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Playback Velocity Speed</label>
                <select id="speedSelect" onchange="changePlaybackSpeed()">
                    <option value="0.5">0.5x (Slowed & Reverb)</option>
                    <option value="1.0" selected>1.0x (Normal)</option>
                    <option value="1.5">1.5x (Nightcore)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Sleep Shutdown Timer</label>
                <select id="timerSelect" onchange="configureSleepTimer()">
                    <option value="0" selected>Disabled</option>
                    <option value="15">15 Minutes</option>
                    <option value="30">30 Minutes</option>
                </select>
            </div>
            <div class="setting-item">
                <label>3-Band Equalizer</label>
                <div class="eq-slider-group">
                    <div class="eq-slider"><input type="range" id="eqBass" min="-10" max="10" value="4" oninput="tuneEqualizer()"><label>BASS</label></div>
                    <div class="eq-slider"><input type="range" id="eqMid" min="-10" max="10" value="0" oninput="tuneEqualizer()"><label>MID</label></div>
                    <div class="eq-slider"><input type="range" id="eqTreble" min="-10" max="10" value="2" oninput="tuneEqualizer()"><label>TREBLE</label></div>
                </div>
            </div>
            <button class="btn-panel" style="color:#ff4d4d; border-color:#555;" onclick="purgeVaultStorage()">Wipe Vault Memory</button>
        </div>
    </div>

    <!-- UP NEXT QUEUE MODAL -->
    <div class="modal-overlay" id="queueModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-list-ol"></i> Up Next Play Queue</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('queueModal')"></i>
            </div>
            <div id="queueList" style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:var(--text-grey);">
                <p>Loading queue sequence...</p>
            </div>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-user-astronaut"></i> Profile Configuration</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="setting-item">
                <label>User Alias</label>
                <input type="text" id="usernameInput" placeholder="Enter name...">
            </div>
            <button class="btn-panel" style="background:var(--primary-glow); color:#000;" onclick="saveProfileAccount()">Save Profile</button>
        </div>
    </div>

    <!-- WRAPPED ANALYTICS MODAL -->
    <div class="modal-overlay" id="analyticsModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-chart-pie"></i> Local Wrapped Stats</h3>
                <i class="fas fa-times close-btn" onclick="closeModal('analyticsModal')"></i>
            </div>
            <div class="setting-item">
                <label>Most Played Track</label>
                <p id="topTrackLabel" style="font-size:15px; font-weight:bold; color:var(--primary-glow);">No data yet.</p>
            </div>
            <div class="setting-item">
                <label>Total Offline Playback Sessions</label>
                <p id="totalPlayLabel" style="font-size:14px; color:#fff;">0 Sessions</p>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        const multiFileInput = document.getElementById('multiFileInput');
        const songGrid = document.getElementById('songGrid');
        const playerBar = document.getElementById('playerBar');
        const micBtn = document.getElementById('micBtn');
        const trackCount = document.getElementById('trackCount');
        
        let trackList = [];
        let db;
        let isListening = false;
        let recognition;
        let currentPlayingIndex = -1;

        // Web Audio Nodes
        let audioCtx, audioSource, bassFilter, midFilter, trebleFilter, pannerNode, analyser, canvas, canvasCtx;
        let isBassBoosted = false, isSpatialActive = false, pannerAngle = 0;

        const imagesPool = [
            "https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=300",
            "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=300",
            "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=300"
        ];

        // INDEXEDDB VAULT
        const dbRequest = indexedDB.open("HarmonyStudioMasterDB", 10);
        dbRequest.onupgradeneeded = (e) => {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("vault_music")) {
                database.createObjectStore("vault_music", { keyPath: "id", autoIncrement: true });
            }
        };
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadTracksFromDB();
            initializeProfileSystem();
        };

        function loadTracksFromDB() {
            if (!db) return;
            const transaction = db.transaction(["vault_music"], "readonly");
            const store = transaction.objectStore("vault_music");
            store.getAll().onsuccess = (event) => {
                trackList = event.target.result;
                renderSongGrid();
            };
        }

        function renderSongGrid() {
            songGrid.innerHTML = '';
            trackCount.innerText = `${trackList.length} Tracks Configured`;
            if (trackList.length === 0) {
                songGrid.innerHTML = '<p style="color:var(--text-grey); padding:10px;">Vault empty. Select files to populate.</p>';
                return;
            }
            trackList.forEach((track, index) => {
                const cleanName = track.title.replace(/_/g, " ").replace(/\(0\)/g, "").replace(/\(320 kbps\)/g, "");
                const card = document.createElement('div');
                card.className = 'song-card';
                card.id = `track-card-${index}`;
                card.addEventListener('click', () => playTrack(index));
                card.innerHTML = `
                    <div class="playing-indicator">LIVE</div>
                    <img src="${track.img}">
                    <h3>${cleanName}</h3>
                `;
                songGrid.appendChild(card);
            });
        }

        multiFileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            const transaction = db.transaction(["vault_music"], "readwrite");
            const store = transaction.objectStore("vault_music");
            Array.from(files).forEach((file) => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const randomImg = imagesPool[Math.floor(Math.random() * imagesPool.length)];
                store.add({ title: cleanName, img: randomImg, audioBlob: file, playCount: 0 });
            });
            transaction.oncomplete = () => loadTracksFromDB();
        });

        // HIGH DYNAMIC LIGHTS & AUDIO ENGINE
        function initializeAudioEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSource = audioCtx.createMediaElementSource(audio);
            
            bassFilter = audioCtx.createBiquadFilter(); bassFilter.type = "lowshelf"; bassFilter.frequency.value = 200;
            midFilter = audioCtx.createBiquadFilter(); midFilter.type = "peaking"; midFilter.frequency.value = 1000; midFilter.Q.value = 1.0;
            trebleFilter = audioCtx.createBiquadFilter(); trebleFilter.type = "highshelf"; trebleFilter.frequency.value = 3000;
            
            pannerNode = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 128; // High resolution FFT
            
            audioSource.connect(bassFilter);
            bassFilter.connect(midFilter);
            midFilter.connect(trebleFilter);
            if(pannerNode) { trebleFilter.connect(pannerNode); pannerNode.connect(analyser); }
            else { trebleFilter.connect(analyser); }
            analyser.connect(audioCtx.destination);
            
            tuneEqualizer();
            startLightsVisualizer();
        }

        function tuneEqualizer() {
            if (!audioCtx) return;
            bassFilter.gain.value = parseFloat(document.getElementById('eqBass').value) + (isBassBoosted ? 8 : 0);
            midFilter.gain.value = document.getElementById('eqMid').value;
            trebleFilter.gain.value = document.getElementById('eqTreble').value;
        }

        function toggleBassBoost() {
            isBassBoosted = !isBassBoosted;
            document.getElementById('bassBoostBtn').classList.toggle('active', isBassBoosted);
            tuneEqualizer();
        }

        function toggleSpatialAudio() {
            isSpatialActive = !isSpatialActive;
            document.getElementById('spatialBtn').classList.toggle('active', isSpatialActive);
            if(isSpatialActive) rotate8DAudio();
        }

        function rotate8DAudio() {
            if(!isSpatialActive || !pannerNode) return;
            pannerAngle += 0.02;
            pannerNode.pan.value = Math.sin(pannerAngle);
            requestAnimationFrame(rotate8DAudio);
        }

        function startLightsVisualizer() {
            canvas = document.getElementById('canvasLights');
            canvasCtx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                let bassSum = dataArray[0] + dataArray[1] + dataArray[2] + dataArray[3];
                let intensity = Math.min(1.0, bassSum / 400); // Amplified sensitivity
                
                document.getElementById('playerBar').style.boxShadow = `0 -${10 + intensity * 35}px ${20 + intensity * 30}px rgba(0, 240, 255, ${0.4 + intensity * 0.6})`;
                
                let barWidth = (canvas.width / bufferLength) * 1.5;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let barHeight = (dataArray[i] / 255) * canvas.height * 2.5; // Amplified height
                    let gradient = canvasCtx.createLinearGradient(0, canvas.height, 0, 0);
                    gradient.addColorStop(0, 'rgba(0, 240, 255, 0.2)');
                    gradient.addColorStop(1, 'rgba(255, 0, 127, 0.9)');
                    
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        function playTrack(index) {
            initializeAudioEngine();
            if (index < 0 || index >= trackList.length) return;
            
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active-track'));
            const activeCard = document.getElementById(`track-card-${index}`);
            if (activeCard) activeCard.classList.add('active-track');

            currentPlayingIndex = index;
            const track = trackList[index];
            
            track.playCount = (track.playCount || 0) + 1;
            const tx = db.transaction(["vault_music"], "readwrite");
            tx.objectStore("vault_music").put(track);

            audio.src = URL.createObjectURL(track.audioBlob);
            document.getElementById('p-title').innerText = track.title;
            document.getElementById('p-img').src = track.img;
            
            audio.play().catch(() => {});
            playerBar.classList.add('active');
            changePlaybackSpeed();
            updateQueueUI();
        }

        function playNextTrack() { if (trackList.length > 0) playTrack((currentPlayingIndex + 1) % trackList.length); }
        function playPreviousTrack() { if (trackList.length > 0) playTrack((currentPlayingIndex - 1 + trackList.length) % trackList.length); }
        audio.addEventListener('ended', playNextTrack);

        function changePlaybackSpeed() { if (audio) audio.playbackRate = parseFloat(document.getElementById('speedSelect').value); }
        function configureSleepTimer() {
            let mins = parseInt(document.getElementById('timerSelect').value);
            if (mins > 0) setTimeout(() => { audio.pause(); alert("Sleep Timer Shutdown Complete."); }, mins * 60 * 1000);
        }

        function changeTheme(theme) {
            document.body.className = '';
            if (theme !== 'cyan') document.body.classList.add(`theme-${theme}`);
        }

        function updateQueueUI() {
            const qList = document.getElementById('queueList');
            qList.innerHTML = '';
            for(let i=1; i<=5; i++) {
                let nextIdx = (currentPlayingIndex + i) % trackList.length;
                if(trackList[nextIdx]) {
                    qList.innerHTML += `<div style="padding:8px; background:#181818; border-radius:6px;">${i}. ${trackList[nextIdx].title}</div>`;
                }
            }
        }

        // BILINGUAL AI ENGINE
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                if (command.includes("next") || command.includes("aage")) playNextTrack();
                else if (command.includes("back") || command.includes("piche")) playPreviousTrack();
                else if (command.includes("stop") || command.includes("pause")) audio.pause();
                else if (command.includes("play") || command.includes("start")) audio.play().catch(() => {});
                else if (command.includes("volume up")) audio.volume = Math.min(1.0, audio.volume + 0.2);
                else if (command.includes("volume down")) audio.volume = Math.max(0.0, audio.volume - 0.2);
            };
            recognition.onend = () => { if (isListening) recognition.start(); };
        }

        function toggleVoiceAI() {
            if (!recognition) return alert("Speech API missing.");
            if (!isListening) {
                recognition.start(); isListening = true;
                micBtn.classList.add('listening'); micBtn.querySelector('span').innerText = "AI Active";
            } else {
                isListening = false; recognition.stop();
                micBtn.classList.remove('listening'); micBtn.querySelector('span').innerText = "AI Mode OFF";
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id === 'analyticsModal') buildWrappedAnalytics(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function initializeProfileSystem() {
            let user = localStorage.getItem('harmony_username') || "Karan";
            document.getElementById('profileNameDisplay').innerText = user;
            document.getElementById('usernameInput').value = user;
        }

        function saveProfileAccount() {
            let val = document.getElementById('usernameInput').value || "Karan";
            localStorage.setItem('harmony_username', val);
            document.getElementById('profileNameDisplay').innerText = val;
            closeModal('profileModal');
        }

        function buildWrappedAnalytics() {
            let total = 0; let topTrack = "None"; let maxCount = 0;
            trackList.forEach(t => {
                total += (t.playCount || 0);
                if ((t.playCount || 0) > maxCount) { maxCount = t.playCount; topTrack = t.title; }
            });
            document.getElementById('totalPlayLabel').innerText = `${total} Sessions Tracked`;
            document.getElementById('topTrackLabel').innerText = topTrack;
        }

        function purgeVaultStorage() {
            if (confirm("Wipe all stored music from vault?")) {
                const tx = db.transaction(["vault_music"], "readwrite");
                tx.objectStore("vault_music").clear().onsuccess = () => {
                    trackList = []; renderSongGrid(); closeModal('settingsModal'); playerBar.classList.remove('active'); audio.src = '';
                };
            }
        }

        // SHORTCUTS (Spacebar, Arrows)
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); audio.paused ? audio.play() : audio.pause(); }
            if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }
            if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 10); }
            if (e.code === 'ArrowUp') { e.preventDefault(); audio.volume = Math.min(1.0, audio.volume + 0.1); }
            if (e.code === 'ArrowDown') { e.preventDefault(); audio.volume = Math.max(0.0, audio.volume - 0.1); }
        });

        function searchSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.song-card').forEach(card => {
                const titleText = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = titleText.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
